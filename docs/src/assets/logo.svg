<?xml version="1.0" encoding="UTF-8"?>
<!-- Logo for LoweredDistributions.jl: a right-skewed density curve lowered
     into a small state-transition chain (a phase-type / CTMC), coloured
     with the Julia palette. -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"
     viewBox="0 0 400 300" role="img"
     aria-label="LoweredDistributions.jl logo">
  <title>LoweredDistributions.jl</title>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0,0 L 10,5 L 0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Density: right-skewed, like a delay distribution's pdf -->
  <path d="M 40,150 C 70,150 88,55 130,42
           C 168,31 182,55 215,95
           C 262,148 305,150 362,150"
        fill="none" stroke="#4063d8" stroke-width="7"
        stroke-linecap="round"/>
  <line x1="40" y1="150" x2="362" y2="150" stroke="#94a3b8" stroke-width="2"/>

  <!-- Lowering: the distribution drops into its chain representation -->
  <line x1="201" y1="163" x2="201" y2="196" stroke="#94a3b8"
        stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round"
        marker-end="url(#arrow)"/>

  <!-- The lowered chain: three transient phases feeding an absorbing state -->
  <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
    <line x1="92" y1="230" x2="148" y2="230" marker-end="url(#arrow)"/>
    <line x1="192" y1="230" x2="248" y2="230" marker-end="url(#arrow)"/>
    <line x1="292" y1="230" x2="337" y2="230" marker-end="url(#arrow)"/>
  </g>
  <g stroke="none">
    <circle cx="70" cy="230" r="22" fill="#4063d8"/>
    <circle cx="170" cy="230" r="22" fill="#9558b2"/>
    <circle cx="270" cy="230" r="22" fill="#389826"/>
    <circle cx="359" cy="230" r="18" fill="#cb3c33"/>
  </g>
</svg>
