# PACKAGE-OWNED — not part of the kit's managed docs infrastructure.
# Isolated environment for the getting-started tutorial's AlgebraicPetri
# section, mirroring `test/algebraic_petri`'s isolated-environment pattern:
# AlgebraicPetri 0.10's own Catalyst weakdep extension caps Catalyst at "13",
# incompatible with this package's own `Catalyst = "16"` compat, so the two
# cannot resolve into the main `docs/Project.toml` environment (which needs
# Catalyst for the reaction-network section). The tutorial runs `demo.jl`
# here in a subprocess and prints its real output. Run it by hand with:
#
#   julia --project=docs/algebraic_petri docs/algebraic_petri/demo.jl
[deps]
AlgebraicPetri = "4f99eebe-17bf-4e98-b6a1-2c4f205a959b"
Distributions = "31c24e10-a181-5473-b8eb-7969acd0382f"
LoweredDistributions = "8539b7eb-0b85-40d0-a8a6-65093c3d0137"

[compat]
AlgebraicPetri = "0.10"
Distributions = "0.25"

[sources]
LoweredDistributions = {path = "../.."}
