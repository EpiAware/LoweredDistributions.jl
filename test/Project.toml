# PACKAGE-OWNED — scaffold writes this once and never overwrites it.
# The test environment. Seeded with the deps the shared QA helpers and AD
# harness need; add the package's own test-only deps here. EpiAwarePackageTools
# supplies the helpers; until it is registered, pin it via `[sources]` below.
[deps]
