# Bounded compat for the seeded QA + AD deps (mirrors CensoredDistributions.jl).
# The package under test and EpiAwarePackageTools are pinned by `[sources]`, so
# they carry no compat entry. Add a bound for each test-only dep you add.
[compat]
ADTypes = "1"
Aqua = "0.8"
BenchmarkTools = "1"
Catalyst = "16"
ConvolvedDistributions = "0.2"
DifferentiationInterface = "0.6, 0.7"
DifferentiationInterfaceTest = "0.9, 0.10"
Distributions = "0.25"
Documenter = "1"
EpiAwareADTools = "0.1"
ExplicitImports = "1"
ForwardDiff = "0.10, 1"
JET = "0.9, 0.10"
JuliaFormatter = "2"
JumpProcesses = "9"
LinearAlgebra = "1"
OrdinaryDiffEqTsit5 = "1, 2"
Pkg = "1"
Random = "1"
SciMLBase = "2, 3"
Statistics = "1"
Test = "1"
TestItemRunner = "1"
TestItems = "1"

[sources]
LoweredDistributions = {path = ".."}
# Until EpiAwarePackageTools is registered, it is pinned by git so the env
# resolves out of the box. Switch to a local path if you develop the kit
# alongside this package, e.g. EpiAwarePackageTools = {path = "../../EpiAwarePackageTools.jl"}.
EpiAwarePackageTools = {url = "https://github.com/EpiAware/EpiAwarePackageTools.jl", rev = "main"}
# ConvolvedDistributions is registered at 0.1.0, but the public `components`
# accessor the bridge peels a `Convolved` with lands in 0.2 — pin `main` until
# 0.2 registers, then this can drop to a registry resolve.
ConvolvedDistributions = {url = "https://github.com/EpiAware/ConvolvedDistributions.jl", rev = "main"}
# EpiAwareADTools is ConvolvedDistributions' (unregistered) transitive dep; a
# dependency's own [sources] is ignored, so the root env must pin it too.
EpiAwareADTools = {url = "https://github.com/EpiAware/EpiAwareADTools.jl", rev = "main"}
